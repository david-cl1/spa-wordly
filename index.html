<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Single Page Application (SPA)- Wordly</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>DICTIONARY</h1>
   <h2>Look up the definition of any English word</h2>
 <input type="text" id="textInput" placeholder="Search Anything...">
  <button id="searchButton">Search</button>
    <p id="textInputDisplay">Your word will be displayed here.</p>
    <p id="searchResultDisplay"> </p>
    <p id="PhoneticDisplay"> </p>
    <p id="originDisplay"> </p>
    <p id="meaningsDisplay"> </p>
    <p id="exampleDisplay"> </p>
    <p id="synonymsDisplay"> </p>
    <p id="antonymsDisplay"> </p>
 <script src="script.js"></script>
</body>
</html>
